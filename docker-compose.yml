services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      CHURN_MODEL_PATH: /app/artifacts/churn_bundle.joblib
    volumes:
      - ./artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
